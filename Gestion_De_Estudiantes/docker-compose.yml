services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: colegio_acceso
      POSTGRES_USER: colegio
      POSTGRES_PASSWORD: colegio123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles: ["prod"]

  backend:
    build:
      context: ./gestion-acceso-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: colegio_acceso
      DB_USER: colegio
      DB_PASSWORD: colegio123
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-long-random-secret-key}
      WHATSAPP_BRIDGE_URL: http://whatsapp-bridge:3001
      WHATSAPP_BRIDGE_API_KEY: ${WHATSAPP_BRIDGE_API_KEY:-}
    depends_on:
      - whatsapp-bridge
    volumes:
      - sqlite_data:/app/data

  whatsapp-bridge:
    build:
      context: ./whatsapp-bridge
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      WHATSAPP_BRIDGE_API_KEY: ${WHATSAPP_BRIDGE_API_KEY:-}
    volumes:
      - wwebjs_auth:/app/.wwebjs_auth

  frontend:
    build:
      context: ./colegio-gestion-acceso
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
  sqlite_data:
  wwebjs_auth:
