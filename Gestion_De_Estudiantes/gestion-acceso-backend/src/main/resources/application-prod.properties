spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:colegio_acceso}
spring.datasource.username=${DB_USER:colegio}
spring.datasource.password=${DB_PASSWORD:colegio123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

whatsapp.provider=${WHATSAPP_PROVIDER:bridge}
whatsapp.business-api-url=${WHATSAPP_BUSINESS_API_URL:}
whatsapp.business-api-token=${WHATSAPP_BUSINESS_API_TOKEN:}

app.jwt.secret=${JWT_SECRET:change-me-in-production-use-long-random-secret-key}

logging.level.com.colegio.gestionacceso=INFO
