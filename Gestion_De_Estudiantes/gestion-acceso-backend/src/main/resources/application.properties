# Perfil por defecto: SQLite (desarrollo)
spring.datasource.url=jdbc:sqlite:${SQLITE_PATH:alumnos.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=8080

# JWT
app.jwt.secret=dev-secret-change-in-production-min-32-chars-long!!
app.jwt.expiration-ms=86400000

# WhatsApp bridge local
whatsapp.enabled=true
whatsapp.provider=bridge
whatsapp.bridge.url=${WHATSAPP_BRIDGE_URL:http://localhost:3001}
whatsapp.bridge-api-key=${WHATSAPP_BRIDGE_API_KEY:}
whatsapp.max-retries=3

# WhatsApp Business API (perfil prod con whatsapp.provider=business-api)
whatsapp.business-api-url=
whatsapp.business-api-token=

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.com.colegio.gestionacceso=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Swagger (UI en /swagger-ui/index.html; /swagger-ui.html redirige)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
